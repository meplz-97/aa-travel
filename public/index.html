<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>来A钱</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ====== 登录页 ====== -->
  <div id="page-login">
    <div class="login-page">
      <div class="login-logo">💰</div>
      <div class="login-title">来A钱</div>
      <div class="login-subtitle">旅行 AA 记账，轻松算清谁该给谁钱</div>
      <div class="login-form">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="login-nickname" placeholder="起个独一无二的名字" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="随便设一个，不用太复杂" />
        </div>
        <div class="login-error" id="login-error"></div>
        <div class="login-actions">
          <button class="btn btn-outline" onclick="doRegister()">注册</button>
          <button class="btn btn-primary" onclick="doLogin()">登录</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 首页：行程列表 ====== -->
  <div id="page-home" style="display:none">
    <div class="header">
      <h1>💰 来A钱</h1>
      <span style="font-size:13px;opacity:0.8" id="sync-badge"></span>
    </div>
    <div class="user-bar">
      <span>👤 <strong id="my-nickname"></strong></span>
      <span class="logout" onclick="logout()">退出</span>
    </div>
    <div class="scroll-area" id="trip-list"></div>
    <button class="fab" onclick="showNewTrip()">＋</button>
  </div>

  <!-- ====== 行程详情页 ====== -->
  <div id="page-trip" style="display:none">
    <div class="header">
      <button class="back-btn" onclick="goHome()">←</button>
      <h1 id="trip-title">行程</h1>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="showInvite()">📤 邀请</button>
    </div>
    <div class="scroll-area" id="expense-list"></div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="showAddExpense()" style="flex:1">💸 记一笔</button>
      <button class="btn" onclick="showSettle()" style="flex:1;background:var(--primary-dark);color:#fff">🧮 来A钱</button>
    </div>
  </div>

  <!-- ====== 新建行程弹窗 ====== -->
  <div id="modal-new-trip" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>新建行程</h2>
      <div class="form-group">
        <label>行程名称</label>
        <input type="text" id="input-trip-name" placeholder="比如：泰国7日游、周末露营…" />
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline btn-block" onclick="closeModal('modal-new-trip')">取消</button>
        <button class="btn btn-primary btn-block" onclick="createTrip()">创建</button>
      </div>
    </div>
  </div>

  <!-- ====== 邀请弹窗 ====== -->
  <div id="modal-invite" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>📤 邀请朋友</h2>
      <p style="text-align:center;color:var(--text-secondary);font-size:14px">复制链接发给朋友，他们打开就能加入</p>
      <div class="invite-box">
        <div class="invite-url" id="invite-url">生成中…</div>
        <button class="btn btn-primary btn-block" onclick="copyInvite()">📋 复制链接</button>
      </div>
      <button class="btn btn-outline btn-block" style="margin-top:8px" onclick="closeModal('modal-invite')">关闭</button>
    </div>
  </div>

  <!-- ====== 记一笔弹窗 ====== -->
  <div id="modal-expense" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>💸 记一笔</h2>
      <div class="form-group">
        <label>货币</label>
        <div class="currency-selector" id="currency-selector"></div>
      </div>
      <div class="form-group">
        <label>金额 <span id="currency-hint" style="font-weight:400;color:var(--text-secondary);font-size:12px"></span></label>
        <input type="number" id="input-amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal" />
      </div>
      <div class="form-group">
        <label>描述</label>
        <input type="text" id="input-desc" placeholder="午餐、打车…" />
      </div>
      <div class="form-group">
        <label>类别</label>
        <div class="cat-grid" id="cat-grid"></div>
      </div>
      <div class="form-group">
        <label>谁付的？</label>
        <div class="people-list" id="payer-list"></div>
      </div>
      <div class="form-group">
        <label>谁参与分摊？</label>
        <div class="people-list" id="split-list"></div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline btn-block" onclick="closeModal('modal-expense')">取消</button>
        <button class="btn btn-primary btn-block" onclick="addExpense()">✓ 记下</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast ====== -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="/app.js"></script>
</body>
</html>
